<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yolulo — SOP Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--primary:#00D9A0;--primary-dark:#00B885;--secondary:#6366F1;--accent:#F59E0B;--bg-dark:#0A0E27;--bg-card:#131938;--bg-elevated:#1A2142;--text-primary:#F8FAFC;--text-secondary:#94A3B8;--text-muted:#64748B;--border:rgba(148,163,184,0.1);--success:#10B981;--warning:#F59E0B;--error:#EF4444}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Manrope',sans-serif;background:var(--bg-dark);color:var(--text-primary);line-height:1.6;min-height:100vh}
.header{background:linear-gradient(135deg,var(--bg-card) 0%,var(--bg-elevated) 100%);border-bottom:1px solid var(--border);padding:3.5rem 2rem 4rem;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;top:-40%;right:-5%;width:600px;height:600px;background:radial-gradient(circle,rgba(0,217,160,0.07) 0%,transparent 70%);border-radius:50%;animation:float 22s ease-in-out infinite}
.header::after{content:'';position:absolute;bottom:-50%;left:-8%;width:500px;height:500px;background:radial-gradient(circle,rgba(99,102,241,0.06) 0%,transparent 70%);border-radius:50%}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(20px,-20px)}}
.header-inner{max-width:1200px;margin:0 auto;position:relative;z-index:1;display:flex;align-items:flex-end;justify-content:space-between;gap:2rem;flex-wrap:wrap}
.header-text .eyebrow{font-size:.8rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.75rem}
.header-text .logo{font-size:3rem;font-weight:800;background:linear-gradient(135deg,var(--primary) 0%,var(--secondary) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.02em;line-height:1}
.header-text h1{font-size:1.35rem;font-weight:500;color:var(--text-secondary);margin-top:.5rem;letter-spacing:-.01em}
.header-stats{display:flex;gap:1.5rem;flex-wrap:wrap}
.stat{text-align:right}
.stat-num{font-family:'JetBrains Mono',monospace;font-size:2rem;font-weight:600;color:var(--primary);display:block;line-height:1}
.stat-label{font-size:.8rem;color:var(--text-muted);font-weight:500;margin-top:.2rem}
.toolbar{position:sticky;top:0;z-index:100;background:rgba(10,14,39,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.toolbar-inner{max-width:1200px;margin:0 auto;padding:1rem 2rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap}
.search-wrap{flex:1;min-width:200px;position:relative}
.search-wrap svg{position:absolute;left:1rem;top:50%;transform:translateY(-50%);color:var(--text-muted)}
#search{width:100%;background:var(--bg-card);border:1px solid var(--border);border-radius:12px;padding:.75rem 1rem .75rem 2.75rem;color:var(--text-primary);font-family:'Manrope',sans-serif;font-size:.9rem;outline:none;transition:border-color .2s}
#search::placeholder{color:var(--text-muted)}
#search:focus{border-color:var(--primary)}
.filter-chips{display:flex;gap:.5rem;flex-wrap:wrap}
.chip{padding:.5rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:100px;color:var(--text-secondary);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap}
.chip:hover,.chip.active{background:rgba(0,217,160,.1);border-color:var(--primary);color:var(--primary)}
.main{max-width:1200px;margin:0 auto;padding:2.5rem 2rem}
.group{margin-bottom:3.5rem}
.group-label{font-size:.75rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text-muted);margin-bottom:1.25rem;display:flex;align-items:center;gap:.75rem}
.group-label::after{content:'';flex:1;height:1px;background:var(--border)}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1.25rem}
.sop-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:1.75rem;transition:all .25s;cursor:pointer;text-decoration:none;display:block;position:relative;overflow:hidden}
.sop-card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(0,217,160,.04) 0%,transparent 60%);opacity:0;transition:opacity .25s}
.sop-card:hover{transform:translateY(-3px);border-color:rgba(0,217,160,.35);box-shadow:0 8px 32px rgba(0,0,0,.3)}
.sop-card:hover::before{opacity:1}
.sop-card.coming-soon{opacity:.5;cursor:default}
.sop-card.coming-soon:hover{transform:none;border-color:var(--border);box-shadow:none}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:1.25rem}
.card-icon-wrap{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
.card-badges{display:flex;flex-direction:column;align-items:flex-end;gap:.4rem}
.badge{padding:.2rem .65rem;border-radius:6px;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.badge-live{background:rgba(16,185,129,.15);color:#10B981}
.badge-soon{background:rgba(100,116,139,.15);color:var(--text-muted)}
.badge-wip{background:rgba(245,158,11,.15);color:var(--warning)}
.card-category{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted);margin-bottom:.4rem}
.card-title{font-size:1.1rem;font-weight:800;letter-spacing:-.01em;margin-bottom:.5rem;color:var(--text-primary)}
.card-desc{font-size:.875rem;color:var(--text-secondary);line-height:1.55}
.card-footer{display:flex;align-items:center;justify-content:space-between;margin-top:1.25rem;padding-top:1rem;border-top:1px solid var(--border)}
.card-meta{display:flex;gap:1rem}
.card-meta-item{font-size:.75rem;color:var(--text-muted);display:flex;align-items:center;gap:.35rem}
.card-arrow{color:var(--primary);font-size:1rem;transition:transform .2s}
.sop-card:hover .card-arrow{transform:translateX(4px)}
.empty{text-align:center;padding:4rem 2rem;display:none}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.4}
.empty h3{font-size:1.25rem;color:var(--text-secondary);margin-bottom:.5rem}
.empty p{color:var(--text-muted);font-size:.9rem}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:2rem;opacity:0;pointer-events:none;transition:opacity .2s}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--bg-card);border:1px solid var(--border);border-radius:20px;max-width:540px;width:100%;padding:2.5rem;position:relative}
.modal-close{position:absolute;top:1.25rem;right:1.25rem;background:var(--bg-elevated);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text-muted);font-size:1.1rem;transition:all .2s}
.modal-close:hover{background:var(--bg-dark);color:var(--text-primary)}
.modal-icon{font-size:2.5rem;margin-bottom:1rem}
.modal h2{font-size:1.5rem;font-weight:800;margin-bottom:.5rem}
.modal-desc{color:var(--text-secondary);font-size:.95rem;margin-bottom:2rem;line-height:1.6}
.modal-actions{display:flex;gap:1rem;flex-wrap:wrap}
.btn{padding:.875rem 1.75rem;border-radius:12px;font-family:'Manrope',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;border:none;transition:all .2s;text-decoration:none;display:inline-flex;align-items:center;gap:.5rem}
.btn-primary{background:linear-gradient(135deg,var(--primary) 0%,var(--primary-dark) 100%);color:#0A0E27}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,217,160,.3)}
.btn-secondary{background:var(--bg-elevated);color:var(--text-primary);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
.footer{background:var(--bg-card);border-top:1px solid var(--border);padding:2.5rem 2rem;text-align:center;margin-top:4rem}
.footer-logo{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:.4rem}
.footer p{color:var(--text-muted);font-size:.85rem}
@media(max-width:640px){.header-inner{flex-direction:column;align-items:flex-start}.header-stats{justify-content:flex-start}.stat{text-align:left}.cards-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <div class="header-text">
      <div class="eyebrow">Internal Knowledge Base</div>
      <div class="logo">Yolulo</div>
      <h1>Standard Operating Procedures</h1>
    </div>
    <div class="header-stats">
      <div class="stat"><span class="stat-num" id="live-count">0</span><div class="stat-label">Live SOPs</div></div>
      <div class="stat"><span class="stat-num" id="total-count">0</span><div class="stat-label">Total Planned</div></div>
    </div>
  </div>
</div>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input id="search" type="text" placeholder="Search SOPs…" autocomplete="off">
    </div>
    <div class="filter-chips">
      <div class="chip active" data-filter="all">All</div>
      <div class="chip" data-filter="merchants">Merchants</div>
      <div class="chip" data-filter="orders">Orders</div>
      <div class="chip" data-filter="drivers">Drivers</div>
      <div class="chip" data-filter="customers">Customers</div>
      <div class="chip" data-filter="platform">Platform</div>
      <div class="chip" data-filter="finance">Finance</div>
    </div>
  </div>
</div>

<div class="main" id="main">
  <div class="empty" id="empty-state">
    <div class="empty-icon">🔍</div>
    <h3>No SOPs found</h3>
    <p>Try adjusting your search or filter</p>
  </div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-icon" id="modal-icon"></div>
    <h2 id="modal-title"></h2>
    <p class="modal-desc" id="modal-desc"></p>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<div class="footer">
  <div class="footer-logo">Yolulo</div>
  <p>SOP Hub · Hyperzod Platform · Internal Use Only</p>
</div>

<script>
const SOPS = [
  // ── MERCHANTS ──────────────────────────────────────────────────────────
  {id:'merchant-setup',category:'merchants',icon:'🏪',iconBg:'rgba(0,217,160,0.12)',title:'New Merchant Setup',desc:'Complete onboarding workflow for adding a new merchant — details, zones, timings, commissions and payouts.',status:'live',steps:10,file:'merchant-setup-sop.html',updated:'Mar 2026'},
  {id:'merchant-categories',category:'merchants',icon:'🏷️',iconBg:'rgba(99,102,241,0.12)',title:'Merchant Category Management',desc:'How to create, edit and manage merchant business categories — name, image, sort order and status.',status:'live',steps:4,file:'category-management-sop.html',updated:'Mar 2026'},
  {id:'ai-recommendations',category:'merchants',icon:'✨',iconBg:'rgba(99,102,241,0.12)',title:'AI Recommendations',desc:'How to enable or disable the platform-wide AI-powered merchant recommendation feature (Beta).',status:'live',steps:3,file:'ai-recommendations-sop.html',updated:'Mar 2026'},
  {id:'add-menu-item',category:'merchants',icon:'🍽️',iconBg:'rgba(0,217,160,0.12)',title:'Add a Menu Item',desc:'How to create a new product in a merchant catalog — name, description, pricing, image, category and add-ons.',status:'live',steps:4,file:'add-menu-item-sop.html',updated:'Mar 2026'},
  {id:'edit-menu-item',category:'merchants',icon:'✏️',iconBg:'rgba(245,158,11,0.12)',title:'Edit a Menu Item',desc:'How to update an existing product — price changes, image swaps, status, category and tax settings.',status:'live',steps:5,file:'edit-menu-item-sop.html',updated:'Mar 2026'},
  {id:'edit-merchant',category:'merchants',icon:'⚙️',iconBg:'rgba(99,102,241,0.12)',title:'Editing a Merchant',desc:'Update any merchant setting — details, address, category, commission, taxes, delivery, payments, status, timezone and more.',status:'live',steps:12,file:'edit-merchant-sop.html',updated:'Mar 2026'},
  {id:'import-export-merchants',category:'merchants',icon:'📦',iconBg:'rgba(245,158,11,0.12)',title:'Import & Export Merchants',desc:'Bulk-create merchants via CSV import and export all merchant data for backup or reporting.',status:'live',steps:3,file:'import-export-merchants-sop.html',updated:'Mar 2026'},
  {id:'merchant-offboard',category:'merchants',icon:'🔒',iconBg:'rgba(239,68,68,0.12)',title:'Offboarding a Merchant',desc:'Safe process for deactivating a merchant, settling outstanding payments and archiving data.',status:'soon',steps:5,file:null,updated:'Coming soon'},
  // ── ORDERS ─────────────────────────────────────────────────────────────
  {id:'managing-orders',category:'orders',icon:'📋',iconBg:'rgba(99,102,241,0.12)',title:'Managing Orders',desc:'View, filter, action and annotate orders — status changes, delivery provider, date filters, notes and cart recovery.',status:'live',steps:8,file:'managing-orders-sop.html',updated:'Mar 2026'},
  {id:'order-issues',category:'orders',icon:'⚠️',iconBg:'rgba(245,158,11,0.12)',title:'Handling Order Issues',desc:'Refunds, cancellations, late deliveries, missing items and customer escalations.',status:'soon',steps:7,file:null,updated:'Coming soon'},
  // ── CUSTOMERS ──────────────────────────────────────────────────────────
  {id:'managing-customers',category:'customers',icon:'👥',iconBg:'rgba(99,102,241,0.12)',title:'Managing Customers',desc:'View, add, edit, delete and log in as customers — import/export, detail panels and segmentation.',status:'live',steps:9,file:'managing-customers-sop.html',updated:'Mar 2026'},
  // ── DRIVERS ────────────────────────────────────────────────────────────
  {id:'autozod',category:'drivers',icon:'🚴',iconBg:'rgba(0,217,160,0.12)',title:'Autozod Driver Management',desc:'Access Autozod, monitor the live dispatch dashboard, manage agents, view task history, and handle driver payouts.',status:'live',steps:5,file:'autozod-index-sop.html',updated:'Mar 2026'},
  {id:'driver-zones',category:'drivers',icon:'📍',iconBg:'rgba(99,102,241,0.12)',title:'Driver Zone Management',desc:'Configuring and adjusting driver delivery zones, capacity limits and active hours.',status:'soon',steps:4,file:null,updated:'Coming soon'},
  // ── PLATFORM ───────────────────────────────────────────────────────────
  {id:'promotions',category:'platform',icon:'🎯',iconBg:'rgba(245,158,11,0.12)',title:'Promotions & Coupons',desc:'Creating and managing promotions, discount codes, popups, push notifications and highlight merchants.',status:'live',steps:8,file:'promotions-coupons-sop.html',updated:'Mar 2026'},
  {id:'analytics',category:'platform',icon:'📊',iconBg:'rgba(99,102,241,0.12)',title:'Analytics, Reviews & Reports',desc:'Business Analytics dashboard, customer review moderation, commission reports and order exports.',status:'live',steps:5,file:'analytics-sop.html',updated:'Mar 2026'},
  {id:'users-permissions',category:'platform',icon:'🔑',iconBg:'rgba(139,92,246,0.12)',title:'Users & Permissions',desc:'Managing admin users, role templates, permission levels and access control.',status:'soon',steps:5,file:null,updated:'Coming soon'},
  // ── FINANCE ────────────────────────────────────────────────────────────
  {id:'payouts',category:'finance',icon:'💳',iconBg:'rgba(16,185,129,0.12)',title:'Merchant Payouts',desc:'Stripe Connect setup, payout schedules, transaction fee management and reconciliation.',status:'soon',steps:5,file:null,updated:'Coming soon'},
  {id:'reports-finance',category:'finance',icon:'📈',iconBg:'rgba(99,102,241,0.12)',title:'Financial Reporting',desc:'Accessing sales reports, export functions, payment logs and performance dashboards.',status:'soon',steps:4,file:null,updated:'Coming soon'},
];

const GROUPS = {
  merchants:{label:'Merchants',order:0},
  orders:{label:'Orders',order:1},
  customers:{label:'Customers',order:2},
  drivers:{label:'Drivers',order:3},
  platform:{label:'Platform',order:4},
  finance:{label:'Finance',order:5},
};

let currentFilter = 'all';
let currentSearch = '';

function render() {
  const main = document.getElementById('main');
  const empty = document.getElementById('empty-state');
  const filtered = SOPS.filter(s => {
    const matchFilter = currentFilter === 'all' || s.category === currentFilter;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || s.title.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.category.includes(q);
    return matchFilter && matchSearch;
  });
  main.querySelectorAll('.group').forEach(g => g.remove());
  if (filtered.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const grouped = {};
  filtered.forEach(s => { if (!grouped[s.category]) grouped[s.category] = []; grouped[s.category].push(s); });
  const sorted = Object.entries(grouped).sort((a,b) => GROUPS[a[0]].order - GROUPS[b[0]].order);
  sorted.forEach(([cat, sops]) => {
    const group = document.createElement('div');
    group.className = 'group';
    group.innerHTML = `<div class="group-label">${GROUPS[cat].label}</div><div class="cards-grid" id="grid-${cat}"></div>`;
    main.appendChild(group);
    const grid = document.getElementById(`grid-${cat}`);
    sops.forEach(s => {
      const card = document.createElement('div');
      card.className = `sop-card${s.status === 'soon' ? ' coming-soon' : ''}`;
      card.innerHTML = `
        <div class="card-top">
          <div class="card-icon-wrap" style="background:${s.iconBg}">${s.icon}</div>
          <div class="card-badges">
            ${s.status==='live' ? '<span class="badge badge-live">Live</span>' : ''}
            ${s.status==='soon' ? '<span class="badge badge-soon">Coming Soon</span>' : ''}
            ${s.status==='wip'  ? '<span class="badge badge-wip">In Progress</span>' : ''}
          </div>
        </div>
        <div class="card-category">${GROUPS[s.category].label}</div>
        <div class="card-title">${s.title}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-footer">
          <div class="card-meta">
            <div class="card-meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
              ${s.steps} steps
            </div>
            <div class="card-meta-item">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              ${s.updated}
            </div>
          </div>
          ${s.status==='live' ? '<div class="card-arrow">→</div>' : ''}
        </div>`;
      if (s.status === 'live') card.addEventListener('click', () => openModal(s));
      grid.appendChild(card);
    });
  });
}

function openModal(sop) {
  document.getElementById('modal-icon').textContent = sop.icon;
  document.getElementById('modal-title').textContent = sop.title;
  document.getElementById('modal-desc').textContent = sop.desc;
  const actions = document.getElementById('modal-actions');
  actions.innerHTML = sop.file
    ? `<a href="${sop.file}" target="_blank" class="btn btn-primary">Open SOP →</a><button class="btn btn-secondary" onclick="closeModal()">Close</button>`
    : `<button class="btn btn-secondary" onclick="closeModal()">Close</button>`;
  document.getElementById('modal').classList.add('open');
}

function closeModal() { document.getElementById('modal').classList.remove('open'); }
document.getElementById('modal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
document.getElementById('search').addEventListener('input', e => { currentSearch = e.target.value; render(); });
document.querySelectorAll('.chip').forEach(chip => {
  chip.addEventListener('click', () => {
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    render();
  });
});

document.getElementById('live-count').textContent = SOPS.filter(s => s.status === 'live').length;
document.getElementById('total-count').textContent = SOPS.length;
render();
</script>
</body>
</html>
